name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dev dependencies
        run: uv sync --frozen --group dev

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install all dependencies
        run: uv sync --frozen --group dev

      - name: Run test suite
        run: uv run pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  notebook-validation:
    name: Notebook Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate notebook JSON and cell counts
        run: |
          python -c "
          import json, pathlib, sys
          errors = 0
          for nb in pathlib.Path('notebooks').glob('*.ipynb'):
              try:
                  data = json.loads(nb.read_text(encoding='utf-8'))
                  cells = data.get('cells', [])
                  print(f'OK  {nb.name}: {len(cells)} cells')
              except Exception as e:
                  print(f'ERR {nb.name}: {e}', file=sys.stderr)
                  errors += 1
          sys.exit(errors)
          "
